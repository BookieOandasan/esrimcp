<div class="d-flex flex-column vh-100">
  @if (configService.configError() && showConfigError) {
    <app-error-banner
      [message]="configService.configError()"
      (dismissed)="showConfigError = false"
    />
  }

  @if (!configService.configError()) {
    <main class="flex-grow-1 position-relative">
      <router-outlet />
    </main>
  }
</div>
